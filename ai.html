
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Swiss Joke Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff0000, #ffffff);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
      margin-bottom: 10px;
      color: #d10000;
    }

    #joke {
      font-size: 18px;
      margin: 20px 0;
      min-height: 60px;
    }

    button {
      background: #d10000;
      color: white;
      border: none;
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      background: #a80000;
      transform: scale(1.05);
    }

    .flag {
      font-size: 40px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="flag">🇨🇭</div>
    <h1>Swiss Joke Generator</h1>
    <div id="joke">Click the button to get a Swiss joke!</div>
    <button onclick="generateJoke()">Tell me a joke</button>
  </div>

  <script>
    const jokes = [
      "Why don’t Swiss clocks ever get stressed? Because they always have perfect timing!",
      "Why did the chocolate visit Switzerland? It wanted to find its sweet home!",
      "What’s Switzerland’s favorite exercise? Mountain climbing… slowly and precisely!",
      "Why don’t secrets last long in Switzerland? Because even the cows are well-informed!",
      "Why did the tourist love Switzerland? Because everything was un-brie-lievably good!",
      "What do you call a Swiss cow that tells jokes? A moo-dy comedian!",
      "Why are Swiss bankers so calm? Because they always keep things balanced!",
      "What’s Switzerland’s favorite music? Alpine rock… but very organized!",
      "Why did the cheese break up with the fondue? It felt too melted under pressure!",
      "Why is Switzerland so good at sports? Because they always train at the peak!"
    ];

    function generateJoke() {
      const randomIndex = Math.floor(Math.random() * jokes.length);
      document.getElementById("joke").textContent = jokes[randomIndex];
    }
  </script>

</body>
</html>
